<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BhumiShop - Admin</title>
  <script>
    // GitHub Pages SPA fallback - redirect all 404s to index.html
    // while preserving the URL path so Vue Router can handle it
    sessionStorage && sessionStorage.setItem('spa-redirect', window.location.pathname + window.location.search + window.location.hash);
    window.location.replace('/BhumiAdm/index.html');
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=/BhumiAdm/">
  </noscript>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
