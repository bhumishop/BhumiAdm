<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BhumiShop - Admin</title>
  <script>
    // GitHub Pages SPA fallback - redirect all 404s to index.html
    // while preserving the path for client-side routing
    var path = window.location.pathname;
    var basePath = '/BhumiAdm/';
    // Redirect to index.html, preserving the original path in the URL
    var redirect = basePath + 'index.html' + window.location.search + window.location.hash;
    window.location.replace(redirect);
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0; url=/BhumiAdm/">
  </noscript>
</head>
<body>
  <p>Redirecting...</p>
</body>
</html>
